name: Release

on:
  push:
    tags:
      - v*

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Setup Python environment
        uses: ./.github/actions/setup-python

      - name: Get Version
        id: version
        run: |
          echo "VERSION=$(pdm show --version)" >> $GITHUB_OUTPUT
          echo "TAG_VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
          echo "TAG_NAME=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Check Version
        if: steps.version.outputs.VERSION != steps.version.outputs.TAG_VERSION
        run: exit 1

      - name: Build Package
        run: |
          rm -rf dist
          pdm build

      - name: Validate Built Package
        run: |
          python -m venv .release-venv
          source .release-venv/bin/activate
          python -m pip install --upgrade pip
          python -m pip install dist/*.whl
          python - <<'PY'
          import importlib.metadata as metadata
          import importlib.util

          module_name = "nonebot_plugin_avatar_manager"
          spec = importlib.util.find_spec(module_name)
          if spec is None:
              raise SystemExit(f"missing module: {module_name}")

          entry_points = metadata.entry_points(group="nonebot.plugin")
          if not any(
              entry_point.name == module_name
              and entry_point.value == module_name
              for entry_point in entry_points
          ):
              raise SystemExit(f"missing nonebot entry point: {module_name}")

          print("package validation passed")
          PY

      - name: Publish Package
        run: |
          pdm publish
          gh release upload --clobber ${{ steps.version.outputs.TAG_NAME }} dist/*.tar.gz dist/*.whl
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
